agents:
  - name: codex-worker
    provider: codex
    model: codex-cli
    endpoint: local-subprocess
    workspace: agentic-os
    allowed_tools: [git, test, edit]
    memory_scope: workspace
    system_prompt: Scoped coding worker. No yolo. No secrets. No commit or push without explicit confirmation.
    enabled: true
  - name: deepseek-chat
    provider: openwebui
    model: deepseek-v4
    endpoint: http://127.0.0.1:18790
    workspace: agentic-os
    allowed_tools: [chat]
    memory_scope: global
    system_prompt: Local OpenAI-compatible chat via OpenWebUI/OpenClaw.
    enabled: true
  - name: hermes-control
    provider: hermes
    model: configured-in-hermes
    endpoint: http://127.0.0.1:9119
    workspace: agentic-os
    allowed_tools: [control, audit, kanban, goals]
    memory_scope: global
    system_prompt: Hermes control-plane adapter scaffold for goal orchestration and registry control.
    enabled: true
  - name: claude-code
    provider: claude
    model: claude-code
    endpoint: local-subprocess
    workspace: agentic-os
    allowed_tools: []
    memory_scope: workspace
    system_prompt: Disabled placeholder until Claude Code is configured.
    enabled: false
  - name: mcp-registry
    provider: local
    model: registry
    endpoint: sqlite
    workspace: agentic-os
    allowed_tools: [registry]
    memory_scope: global
    system_prompt: Placeholder MCP registry for future runtime management.
    enabled: true
