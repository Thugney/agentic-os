agents:
  - name: codex-worker
    label: Codex Worker
    provider: codex
    model: selected-by-codex-subscription
    endpoint: local-cli
    workspace: agentic-os
    allowed_tools: [git, test, edit]
    workspace_access: [agentic-os]
    memory_scopes: [workspace, project]
    mcp_channels: [workspace, memory, skills, kanban, audit]
    approval_policy: ask-before-commit-or-push
    system_prompt: Scoped coding worker. No yolo. No secrets. No commit or push without explicit confirmation.
    enabled: true
  - name: deepseek-chat
    label: DeepSeek Chat
    provider: deepseek
    model: selected-at-chat-time
    endpoint: https://api.deepseek.com
    workspace: agentic-os
    allowed_tools: [chat, memory-read]
    workspace_access: [agentic-os]
    memory_scopes: [global, workspace, agent]
    mcp_channels: [memory, workspace, skills, kanban, audit]
    approval_policy: chat-only-no-file-write
    system_prompt: OpenAI-compatible DeepSeek API chat. API key must live in .env as DEEPSEEK_API_KEY. Model is selected from live /v1/models response.
    enabled: true
  - name: hermes-control
    label: Hermes Control
    provider: hermes
    model: configured-in-hermes
    endpoint: http://192.168.1.118:8642
    workspace: agentic-os
    allowed_tools: [control, audit, kanban, goals, gateway]
    workspace_access: [agentic-os]
    memory_scopes: [global, project]
    mcp_channels: [workspace, memory, skills, kanban, audit, gateway]
    approval_policy: ask-before-runtime-action
    system_prompt: Hermes remote control-plane adapter. Requires Hermes API/gateway endpoint or optional local CLI bridge. Dashboard port is not an action bridge.
    enabled: true
  - name: claude-code
    label: Claude Code
    provider: claude
    model: selected-by-claude-subscription
    endpoint: local-cli
    workspace: agentic-os
    allowed_tools: []
    workspace_access: []
    memory_scopes: [workspace]
    mcp_channels: [workspace, memory, skills, audit]
    approval_policy: disabled-until-adapter-ready
    system_prompt: Claude Code subscription CLI adapter placeholder. Requires an authenticated Claude Code CLI/session where Agentic OS can reach it.
    enabled: false
  - name: mcp-registry
    label: MCP Registry
    provider: local
    model: registry
    endpoint: sqlite
    workspace: agentic-os
    allowed_tools: [registry]
    memory_scopes: [global]
    mcp_channels: [skills, tools, audit]
    approval_policy: config-only
    system_prompt: Placeholder MCP registry for future runtime management.
    enabled: true
