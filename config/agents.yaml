agents:
  - name: codex-worker
    provider: codex
    model: codex-cli
    endpoint: local-cli
    workspace: agentic-os
    allowed_tools: [git, test, edit]
    memory_scope: workspace
    system_prompt: Scoped coding worker. No yolo. No secrets. No commit or push without explicit confirmation.
    enabled: true
  - name: deepseek-chat
    provider: deepseek
    model: deepseek-chat
    endpoint: https://api.deepseek.com
    workspace: agentic-os
    allowed_tools: [chat]
    memory_scope: global
    system_prompt: OpenAI-compatible DeepSeek API chat. API key must live in .env as DEEPSEEK_API_KEY.
    enabled: true
  - name: hermes-control
    provider: hermes
    model: configured-in-hermes
    endpoint: http://192.168.1.110:8000
    workspace: agentic-os
    allowed_tools: [control, audit, kanban, goals]
    memory_scope: global
    system_prompt: Hermes remote control-plane adapter. Requires Hermes API/gateway endpoint or optional local CLI bridge.
    enabled: true
  - name: claude-code
    provider: claude
    model: claude-code
    endpoint: local-subprocess
    workspace: agentic-os
    allowed_tools: []
    memory_scope: workspace
    system_prompt: Disabled placeholder until Claude Code is configured.
    enabled: false
  - name: mcp-registry
    provider: local
    model: registry
    endpoint: sqlite
    workspace: agentic-os
    allowed_tools: [registry]
    memory_scope: global
    system_prompt: Placeholder MCP registry for future runtime management.
    enabled: true
