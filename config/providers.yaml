providers:
  - name: deepseek
    label: DeepSeek API
    type: openai_compatible
    connection_mode: cloud_api
    endpoint: https://api.deepseek.com
    url_env: DEEPSEEK_BASE_URL
    default_model: null
    model_selection: live_dropdown
    api_key_env: DEEPSEEK_API_KEY
    enabled: true
    notes: "Default DeepSeek connection. Store the API key in .env as DEEPSEEK_API_KEY; Agentic OS lists available models from /v1/models and lets Robel choose per chat."
  - name: openwebui
    label: OpenWebUI / custom OpenAI-compatible endpoint
    type: openai_compatible
    connection_mode: custom_endpoint
    endpoint: http://127.0.0.1:18790
    url_env: OPENWEBUI_URL
    default_model: null
    model_selection: live_dropdown
    api_key_env: OPENWEBUI_API_KEY
    enabled: false
    notes: "Optional local/custom endpoint. Enable only if Robel chooses OpenWebUI/OpenClaw later."
  - name: codex
    label: Codex
    type: codex
    connection_mode: subscription_cli
    endpoint: local-cli
    cli_binary: codex
    auth_mode: interactive_subscription
    enabled: true
    notes: "Desired path is Robel's Codex subscription through an authenticated CLI/session. Agentic OS must run the Codex adapter where that login exists; API-key mode is not required."
  - name: hermes
    label: Hermes Agent
    type: hermes
    connection_mode: remote_api
    endpoint: http://192.168.1.118:8642
    url_env: HERMES_URL
    cli_binary: hermes
    enabled: true
    notes: "Remote Hermes must use the callable gateway/API at HERMES_URL. The dashboard command on port 9119 only exposes the human dashboard and does not expose capabilities by itself."
  - name: claude
    label: Claude Code
    type: claude_code
    connection_mode: subscription_cli
    endpoint: local-cli
    cli_binary: claude
    auth_mode: interactive_subscription
    enabled: false
    notes: "Desired path is Robel's Claude subscription through Claude Code CLI. Agentic OS needs a subscription CLI adapter; API key is not required."
